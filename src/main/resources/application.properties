spring.application.name=MTSDbe-Reactive

# ============================================================
# R2DBC ? non-blocking PostgreSQL connection
# Host 'postgres' resolves inside Docker network
# Override with env vars for local dev
# ============================================================
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:MTSD}
spring.r2dbc.username=${DB_USER:postgres}
spring.r2dbc.password=${DB_PASS:parola}

# R2DBC connection pool tuning
# Keep pool large enough to not be the bottleneck during benchmarks
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=50
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.validation-query=SELECT 1

# ============================================================
# Server ? different port from MVC (8080) so both run together
# ============================================================
server.port=8081

# ============================================================
# Actuator + Prometheus (benchmarking observability)
# ============================================================
management.endpoints.web.exposure.include=health,prometheus,metrics,threaddump
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

# Reactor Netty event loop metrics ? critical for experiment 8
reactor.netty.http.server.metrics.enabled=true

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:ChangeThisToA256BitSecretKeyForProductionUseOnly!!}
jwt.expiration.ms=86400000

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.data.r2dbc=WARN
logging.level.io.r2dbc.postgresql.QUERY=WARN
logging.level.org.springframework.security=WARN
logging.level.org.mastersdbis=INFO