spring.application.name=MTSDbe-reactive

# R2DBC connection (replaces spring.datasource)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/MTSD
spring.r2dbc.username=postgres
spring.r2dbc.password=parola

# No JPA/Hibernate — schema managed by Flyway or existing schema
# spring.r2dbc.initialization-mode=never

# Actuator
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.prometheus.access=unrestricted

# Reactor Netty metrics
reactor.netty.http.server.metrics.enabled=true

server.port=8081

logging.level.org.springframework.data.r2dbc=DEBUG